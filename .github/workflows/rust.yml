name: Build All Platforms

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ══════════════════════════════════════════
  # Windows Build → .exe (NSIS + MSI)
  # ══════════════════════════════════════════
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^1.6" --locked

      - name: Build Tauri app (Windows)
        run: cargo tauri build

      - name: Upload NSIS installer (.exe)
        uses: actions/upload-artifact@v4
        with:
          name: RasFocus-Windows-NSIS
          path: target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 30

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: RasFocus-Windows-MSI
          path: target/release/bundle/msi/*.msi
          if-no-files-found: warn
          retention-days: 30

      - name: Upload raw Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: RasFocus-Windows-Binary
          path: target/release/rasfocus.exe
          if-no-files-found: warn
          retention-days: 30

  # ══════════════════════════════════════════
  # macOS Build → .dmg + .app
  # ══════════════════════════════════════════
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install macOS system dependencies
        run: |
          # WebKit is included in macOS, no extra install needed
          echo "macOS deps ready"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^1.6" --locked

      - name: Build Tauri app (macOS x86_64)
        run: cargo tauri build --target x86_64-apple-darwin

      - name: Upload macOS DMG (Intel)
        uses: actions/upload-artifact@v4
        with:
          name: RasFocus-macOS-Intel-DMG
          path: target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn
          retention-days: 30

      - name: Upload macOS .app (Intel)
        uses: actions/upload-artifact@v4
        with:
          name: RasFocus-macOS-Intel-App
          path: target/x86_64-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: warn
          retention-days: 30

  # ══════════════════════════════════════════
  # macOS ARM (Apple Silicon) Build
  # ══════════════════════════════════════════
  build-macos-arm:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable (ARM)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^1.6" --locked

      - name: Build Tauri app (macOS ARM)
        run: cargo tauri build --target aarch64-apple-darwin

      - name: Upload macOS DMG (Apple Silicon)
        uses: actions/upload-artifact@v4
        with:
          name: RasFocus-macOS-AppleSilicon-DMG
          path: target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn
          retention-days: 30

  # ══════════════════════════════════════════
  # Linux Build → .deb + .AppImage
  # ══════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            build-essential \
            curl \
            wget \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            xdotool \
            wmctrl \
            libglib2.0-dev \
            libsoup2.4-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^1.6" --locked

      - name: Build Tauri app (Linux)
        run: cargo tauri build

      - name: Upload Linux .deb package
        uses: actions/upload-artifact@v4
        with:
          name: RasFocus-Linux-DEB
          path: target/release/bundle/deb/*.deb
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: RasFocus-Linux-AppImage
          path: target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
          retention-days: 30

      - name: Upload raw Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: RasFocus-Linux-Binary
          path: target/release/rasfocus
          if-no-files-found: warn
          retention-days: 30
